name: zadanie 2
on:
  push:
    branches: [main, 'feature/**']
    paths-ignore: ['docs/**']
  pull_request:
    branches: [main]
env:
  GREETING: "Czesc z Actions"
jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - run: echo "$GREETING / autor: ${{ github.actor }}"
      - id: stamp
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT
      - run: echo "Znacznik: ${{ steps.stamp.outputs.time }}"

